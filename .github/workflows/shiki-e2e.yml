name: Shiki E2E

# Explicit release gate for the Shiki operator control surface.
# Runs Playwright end-to-end tests against a dev-server instance.
#
# Triggers:
#   - Every push to main (guard main-branch regressions).
#   - Pull requests that touch apps/shiki/**, so frontend-only PRs
#     are validated without forcing the full E2E suite to run on
#     every unrelated change across the monorepo.
#   - Manual dispatch via the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - 'apps/shiki/**'
      - 'packages/shared/**'
      - '.github/workflows/shiki-e2e.yml'
  pull_request:
    paths:
      - 'apps/shiki/**'
      - 'packages/shared/**'
      - '.github/workflows/shiki-e2e.yml'
  workflow_dispatch:

concurrency:
  group: shiki-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/shiki

      - name: Run component tests
        run: npm run test:component
        working-directory: apps/shiki

      - name: Run integration tests
        run: npm run test:integration
        working-directory: apps/shiki

      - name: Run Playwright E2E
        run: npm run test:e2e
        working-directory: apps/shiki
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/shiki/playwright-report/
          retention-days: 7
