name: Repo Health

on:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  contents: write

concurrency:
  group: repo-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,security,backend,agent,ml]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      # ── Quality gates ──────────────────────────────────────────

      - name: Validate documentation versions
        run: python scripts/validate_docs.py

      - name: Regenerate generated docs
        run: python scripts/sync_docs.py

      - name: Run core tests (security + integration)
        run: python -m pytest tests/ -v --tb=short

      - name: Run ML model tests
        run: python -m pytest "ML Models/aether-ml/tests/" -v --tb=short

      - name: Verify Python syntax (all modules)
        run: |
          python -m compileall security -q
          python -m compileall "Agent Layer" -q
          python -m compileall "Backend Architecture/aether-backend" -q

      - name: TypeScript type check
        run: npm run typecheck

      - name: TypeScript build
        run: npm run build

      - name: TypeScript tests
        run: npm run test

      - name: Check env vars documented
        run: |
          # Verify every ENABLE_* and *_SECRET_* env var in settings.py
          # has a corresponding entry in .env.example
          missing=0
          for var in $(grep -oP '"\K[A-Z_]+(?=")' "Backend Architecture/aether-backend/config/settings.py" | sort -u); do
            if ! grep -q "^${var}=" .env.example 2>/dev/null; then
              echo "WARNING: $var not in .env.example"
            fi
          done

      # ── Doc drift detection ────────────────────────────────────

      - name: Detect uncommitted generated-doc drift
        id: drift
        run: |
          if [ -n "$(git status --porcelain docs/REPO-INDEX.md docs/AUTOMATION.md)" ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git diff -- docs/REPO-INDEX.md docs/AUTOMATION.md
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-commit generated docs on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.drift.outputs.drift == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/REPO-INDEX.md docs/AUTOMATION.md
          git commit -m 'docs: synchronize generated repository documentation'
          git push

      - name: Fail PRs on drift
        if: ${{ steps.drift.outputs.drift == 'true' && (github.event_name != 'push' || github.ref != 'refs/heads/main') }}
        run: |
          echo 'Generated docs are out of date. Run: python scripts/sync_docs.py'
          exit 1
