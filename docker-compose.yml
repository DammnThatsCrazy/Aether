# =============================================================================
# Aether Platform — Full Stack Docker Compose
#
# Usage:
#   docker compose up -d           Start all services
#   docker compose up redis kafka  Start infrastructure only
#   docker compose logs -f         Follow logs
#   docker compose down            Stop everything
# =============================================================================

services:
  # ── Infrastructure ────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: aether
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

  # ── Application Services ──────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: "Backend Architecture/aether-backend/Dockerfile"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      AETHER_ENV: staging
      DATABASE_URL: postgresql://aether:aether_dev_password@postgres:5432/aether
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BROKERS: kafka:9092
      ML_SERVING_URL: http://ml-serving:8080
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  ml-serving:
    build:
      context: "ML Models/aether-ml"
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      AETHER_ENV: staging
      REDIS_HOST: redis
    command: uvicorn serving.src.api:app --host 0.0.0.0 --port 8080

  # ── Monitoring ────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.49.0
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  prometheus_data:
