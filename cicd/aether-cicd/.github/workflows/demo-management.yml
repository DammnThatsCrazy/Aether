name: "Demo Environment Management"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform on demo environment"
        required: true
        type: choice
        options:
          - deploy
          - teardown
          - reset-data
          - status
  schedule:
    # Auto-teardown every Saturday at 2 AM UTC to save costs over weekends
    - cron: "0 2 * * 6"

concurrency:
  group: demo-management
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.5"

permissions:
  contents: read
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # DETERMINE ACTION
  # ──────────────────────────────────────────────────────────────────────
  prepare:
    name: "Prepare"
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.action.outputs.action }}
    steps:
      - id: action
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "action=teardown" >> $GITHUB_OUTPUT
            echo "Scheduled teardown (weekend cost savings)"
          else
            echo "action=${{ inputs.action }}" >> $GITHUB_OUTPUT
            echo "Manual action: ${{ inputs.action }}"
          fi

  # ──────────────────────────────────────────────────────────────────────
  # DEPLOY: Full Terraform apply + ECS deploy + seed data
  # ──────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy Demo"
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.action == 'deploy'
    environment: demo
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEMO_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init + Apply
        run: |
          cd infrastructure/environments/demo
          terraform init -input=false -backend-config="key=demo/terraform.tfstate"
          terraform apply -auto-approve
      - name: Deploy ECS services
        run: |
          SERVICES=(ingestion identity analytics ml-serving agent campaign consent notification admin)
          for svc in "${SERVICES[@]}"; do
            echo "Deploying aether-${svc} to demo..."
            aws ecs update-service \
              --cluster aether-demo \
              --service "aether-${svc}" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} || true
          done
      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster aether-demo \
            --services aether-ingestion aether-identity aether-analytics \
            --region ${{ env.AWS_REGION }} || true
      - name: Upload playground
        run: |
          if [ -d "playground" ]; then
            aws s3 sync playground/ s3://aether-demo-playground/ \
              --delete --region ${{ env.AWS_REGION }}
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Seed demo data
        run: |
          pip install requests
          python scripts/seed_demo_data.py \
            --url "${{ secrets.DEMO_URL || 'https://demo.aether.io' }}" \
            --api-key "${{ secrets.DEMO_API_KEY }}" \
            --clear-existing
      - name: Notify demo ready
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d '{"text":":sparkles: Aether *demo* environment deployed and seeded!\n:globe_with_meridians: API: https://demo.aether.io\n:video_game: Playground: https://playground.demo.aether.io"}' \
            2>/dev/null || true

  # ──────────────────────────────────────────────────────────────────────
  # TEARDOWN: Scale down to save costs (scheduled + manual)
  # ──────────────────────────────────────────────────────────────────────
  teardown:
    name: "Teardown Demo"
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.action == 'teardown'
    environment: demo
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEMO_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Scale ECS services to zero
        run: |
          SERVICES=(ingestion identity analytics ml-serving agent campaign consent notification admin)
          for svc in "${SERVICES[@]}"; do
            echo "Scaling down aether-${svc}..."
            aws ecs update-service \
              --cluster aether-demo \
              --service "aether-${svc}" \
              --desired-count 0 \
              --region ${{ env.AWS_REGION }} || true
          done
          echo "All demo ECS services scaled to 0"
      - name: Stop RDS cluster (if applicable)
        run: |
          aws rds stop-db-cluster \
            --db-cluster-identifier aether-demo \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true
          echo "Demo RDS cluster stop requested"
      - name: Notify teardown
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d '{"text":":moon: Aether *demo* environment torn down (cost savings). Use `deploy` action to bring it back up."}' \
            2>/dev/null || true

  # ──────────────────────────────────────────────────────────────────────
  # RESET DATA: Re-seed without infra changes
  # ──────────────────────────────────────────────────────────────────────
  reset-data:
    name: "Reset Demo Data"
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.action == 'reset-data'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Clear and re-seed demo data
        run: |
          python scripts/seed_demo_data.py \
            --url "${{ secrets.DEMO_URL || 'https://demo.aether.io' }}" \
            --api-key "${{ secrets.DEMO_API_KEY }}" \
            --clear-existing
      - name: Notify data reset
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d '{"text":":recycle: Aether *demo* data has been reset with fresh sample data."}' \
            2>/dev/null || true

  # ──────────────────────────────────────────────────────────────────────
  # STATUS: Health check + cost report
  # ──────────────────────────────────────────────────────────────────────
  status:
    name: "Demo Status"
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.action == 'status'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEMO_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Check ECS service health
        run: |
          echo "=== Demo ECS Service Status ==="
          SERVICES=(ingestion identity analytics ml-serving agent campaign consent notification admin)
          for svc in "${SERVICES[@]}"; do
            STATUS=$(aws ecs describe-services \
              --cluster aether-demo \
              --services "aether-${svc}" \
              --query 'services[0].{status:status,running:runningCount,desired:desiredCount}' \
              --output json \
              --region ${{ env.AWS_REGION }} 2>/dev/null || echo '{"status":"NOT_FOUND"}')
            echo "aether-${svc}: ${STATUS}"
          done
      - name: Check API health
        run: |
          DEMO_URL="${{ secrets.DEMO_URL }}"
          DEMO_URL="${DEMO_URL:-https://demo.aether.io}"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${DEMO_URL}/v1/health" 2>/dev/null || echo "000")
          echo "API Health: HTTP ${STATUS}"
          if [ "$STATUS" = "200" ]; then
            echo "::notice::Demo API is healthy"
          else
            echo "::warning::Demo API returned HTTP ${STATUS}"
          fi
      - name: Cost estimate (current month)
        run: |
          echo "=== Demo Cost Estimate ==="
          aws ce get-cost-and-usage \
            --time-period Start=$(date -u +%Y-%m-01),End=$(date -u +%Y-%m-%d) \
            --granularity MONTHLY \
            --metrics BlendedCost \
            --filter '{"Tags":{"Key":"Environment","Values":["demo"]}}' \
            --query 'ResultsByTime[0].Total.BlendedCost' \
            --output json \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Cost data unavailable"
      - name: Post status to Slack
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d '{"text":":clipboard: Aether *demo* status check complete. See workflow run for details."}' \
            2>/dev/null || true
