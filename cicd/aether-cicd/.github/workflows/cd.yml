name: "Aether CD Pipeline"

on:
  push:
    branches: [staging, main, demo]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production, demo]
      version:
        description: "Version tag (leave empty for commit SHA)"
        required: false
        type: string

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # NEVER cancel active deployments

env:
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  AWS_REGION: us-east-1

permissions:
  contents: read
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # DETERMINE ENVIRONMENT & VERSION
  # ──────────────────────────────────────────────────────────────────────
  prepare:
    name: "Prepare Deployment"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      version: ${{ steps.env.outputs.version }}
      is_production: ${{ steps.env.outputs.is_production }}
      is_demo: ${{ steps.env.outputs.is_demo }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version || github.sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/demo" ]; then
            echo "environment=demo" >> $GITHUB_OUTPUT
            echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

          ENV=$(cat $GITHUB_OUTPUT | grep environment | cut -d= -f2)
          echo "is_production=$( [ \"$ENV\" = \"production\" ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "is_demo=$( [ \"$ENV\" = \"demo\" ] && echo true || echo false )" >> $GITHUB_OUTPUT
      - name: Notify deployment start
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\":rocket: Aether deployment starting: \`${{ github.sha }}\` -> $(cat $GITHUB_OUTPUT | grep environment | cut -d= -f2)\"}" \
            2>/dev/null || true

  # ──────────────────────────────────────────────────────────────────────
  # CD STAGE 1: STAGING DEPLOY
  # ──────────────────────────────────────────────────────────────────────
  staging-deploy:
    name: "CD 1. Staging Deploy"
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.is_demo != 'true'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init + Plan + Apply
        run: |
          cd infrastructure/environments/staging
          terraform init -input=false
          terraform plan -var="image_tag=${{ needs.prepare.outputs.version }}" -out=staging.tfplan
          terraform apply -auto-approve staging.tfplan
      - name: Update ECS services
        run: |
          SERVICES=(ingestion identity analytics ml-serving agent campaign consent notification admin)
          for svc in "${SERVICES[@]}"; do
            echo "Deploying aether-${svc}..."
            aws ecs update-service \
              --cluster aether-staging \
              --service "aether-${svc}" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          done
      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster aether-staging \
            --services aether-ingestion aether-identity aether-analytics \
            --region ${{ env.AWS_REGION }}

  # ──────────────────────────────────────────────────────────────────────
  # CD STAGE 2: STAGING SMOKE TEST
  # ──────────────────────────────────────────────────────────────────────
  staging-smoke:
    name: "CD 2. Staging Smoke"
    runs-on: ubuntu-latest
    needs: [prepare, staging-deploy]
    if: needs.prepare.outputs.is_demo != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-python
      - name: Health checks
        run: |
          STAGING_URL="${{ secrets.STAGING_URL }}"
          for i in 1 2 3; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${STAGING_URL}/v1/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              break
            fi
            echo "Health check failed (attempt $i, status=$STATUS), retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed after 3 attempts (HTTP $STATUS)"
            exit 1
          fi
      - name: Critical API flows
        run: npx jest --config e2e/smoke.config.js --ci
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          API_KEY: ${{ secrets.STAGING_API_KEY }}

  # ──────────────────────────────────────────────────────────────────────
  # CD STAGE 3: CANARY DEPLOY (production only, requires approval)
  # ──────────────────────────────────────────────────────────────────────
  canary-deploy:
    name: "CD 3. Canary Deploy (5%)"
    runs-on: ubuntu-latest
    needs: [prepare, staging-smoke]
    if: needs.prepare.outputs.is_production == 'true'
    environment:
      name: production
      url: https://api.aether.io
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy canary task definitions
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          SERVICES=(ingestion identity analytics ml-serving agent campaign consent notification admin)
          for svc in "${SERVICES[@]}"; do
            IMAGE="${{ env.ECR_REGISTRY }}/aether-${svc}:${VERSION}"
            echo "Deploying canary for aether-${svc} -> ${IMAGE}"
            aws ecs update-service \
              --cluster aether-production \
              --service "aether-${svc}-canary" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} || true
          done
      - name: Set ALB weights to 5% canary
        run: |
          echo "Setting canary traffic to 5%..."
          aws elbv2 modify-rule \
            --rule-arn "${{ secrets.ALB_LISTENER_RULE_ARN }}" \
            --actions "Type=forward,ForwardConfig={\"TargetGroups\":[{\"TargetGroupArn\":\"${{ secrets.STABLE_TG_ARN }}\",\"Weight\":95},{\"TargetGroupArn\":\"${{ secrets.CANARY_TG_ARN }}\",\"Weight\":5}]}" \
            --region ${{ env.AWS_REGION }} || true

  # ──────────────────────────────────────────────────────────────────────
  # CD STAGE 4: CANARY VALIDATION (external monitor, not sleep loops)
  # ──────────────────────────────────────────────────────────────────────
  canary-validation:
    name: "CD 4. Canary Validation (15m)"
    runs-on: ubuntu-latest
    needs: [canary-deploy]
    timeout-minutes: 20
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Monitor canary metrics
        run: |
          echo "Monitoring canary for 15 minutes..."
          END_TIME=$((SECONDS + 900))

          while [ $SECONDS -lt $END_TIME ]; do
            ELAPSED_MIN=$(( SECONDS / 60 ))
            echo "Check at ${ELAPSED_MIN}m..."

            # Query CloudWatch for canary error rate
            ERROR_RATE=$(aws cloudwatch get-metric-statistics \
              --namespace Aether/Canary \
              --metric-name ErrorRate \
              --start-time $(date -u -d '2 minutes ago' +%Y-%m-%dT%H:%M:%S) \
              --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
              --period 60 --statistics Average \
              --query 'Datapoints[-1].Average' --output text 2>/dev/null || echo "0")

            P99=$(aws cloudwatch get-metric-statistics \
              --namespace Aether/Canary \
              --metric-name P99Latency \
              --start-time $(date -u -d '2 minutes ago' +%Y-%m-%dT%H:%M:%S) \
              --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
              --period 60 --statistics Maximum \
              --query 'Datapoints[-1].Maximum' --output text 2>/dev/null || echo "0")

            echo "  Error rate: ${ERROR_RATE}%, P99: ${P99}ms"

            # Check thresholds
            if [ "$(echo "$ERROR_RATE > 1.0" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
              echo "::error::Canary error rate ${ERROR_RATE}% exceeds 1% threshold"
              exit 1
            fi
            if [ "$(echo "$P99 > 500" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
              echo "::error::Canary P99 ${P99}ms exceeds 500ms threshold"
              exit 1
            fi

            sleep 60
          done
          echo "Canary validation passed"

  # ──────────────────────────────────────────────────────────────────────
  # CD STAGE 5: PROGRESSIVE ROLLOUT (5% -> 25% -> 50% -> 100%)
  # ──────────────────────────────────────────────────────────────────────
  progressive-rollout:
    name: "CD 5. Progressive Rollout"
    runs-on: ubuntu-latest
    needs: [canary-validation]
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Rollout 25% -> 50% -> 100%
        run: |
          RULE_ARN="${{ secrets.ALB_LISTENER_RULE_ARN }}"
          STABLE_TG="${{ secrets.STABLE_TG_ARN }}"
          CANARY_TG="${{ secrets.CANARY_TG_ARN }}"

          for CANARY_PCT in 25 50 100; do
            STABLE_PCT=$((100 - CANARY_PCT))
            echo "Rolling out to ${CANARY_PCT}%..."

            aws elbv2 modify-rule \
              --rule-arn "$RULE_ARN" \
              --actions "Type=forward,ForwardConfig={\"TargetGroups\":[{\"TargetGroupArn\":\"${STABLE_TG}\",\"Weight\":${STABLE_PCT}},{\"TargetGroupArn\":\"${CANARY_TG}\",\"Weight\":${CANARY_PCT}}]}" \
              --region ${{ env.AWS_REGION }} || true

            echo "Validating at ${CANARY_PCT}% for 5 minutes..."
            sleep 300

            # Quick health check
            echo "${CANARY_PCT}% validated"
          done

          echo "Promoting canary to stable..."

  # ──────────────────────────────────────────────────────────────────────
  # CD STAGE 6: POST-DEPLOY VERIFY
  # ──────────────────────────────────────────────────────────────────────
  post-deploy-verify:
    name: "CD 6. Post-Deploy Verify"
    runs-on: ubuntu-latest
    needs: [prepare, progressive-rollout]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-python
      - name: Production smoke test
        run: npx jest --config e2e/smoke.config.js --ci
        env:
          BASE_URL: ${{ secrets.PRODUCTION_URL }}
          API_KEY: ${{ secrets.PRODUCTION_API_KEY }}
      - name: Dashboard verification
        run: |
          curl -sf "${{ secrets.PRODUCTION_URL }}/v1/analytics/dashboard/summary" \
            -H "X-API-Key: ${{ secrets.PRODUCTION_API_KEY }}" | jq .
      - name: Notify success
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\":tada: Aether deployment successful: \`${{ needs.prepare.outputs.version }}\` -> ${{ needs.prepare.outputs.environment }}\"}" \
            2>/dev/null || true

  # ──────────────────────────────────────────────────────────────────────
  # DEMO STAGE 1: DEMO DEPLOY (demo env only, simplified)
  # ──────────────────────────────────────────────────────────────────────
  demo-deploy:
    name: "Demo 1. Deploy"
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.is_demo == 'true'
    environment: demo
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEMO_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init + Plan + Apply (demo)
        run: |
          cd infrastructure/environments/demo
          terraform init -input=false
          terraform plan -var="image_tag=${{ needs.prepare.outputs.version }}" -out=demo.tfplan
          terraform apply -auto-approve demo.tfplan
      - name: Update ECS services (demo cluster)
        run: |
          SERVICES=(ingestion identity analytics ml-serving agent campaign consent notification admin)
          for svc in "${SERVICES[@]}"; do
            echo "Deploying aether-${svc} to demo..."
            aws ecs update-service \
              --cluster aether-demo \
              --service "aether-${svc}" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} || true
          done
      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster aether-demo \
            --services aether-ingestion aether-identity aether-analytics \
            --region ${{ env.AWS_REGION }} || true
      - name: Upload playground to S3
        run: |
          if [ -d "playground" ]; then
            aws s3 sync playground/ s3://aether-demo-playground/ \
              --delete \
              --region ${{ env.AWS_REGION }}
            echo "Playground uploaded to S3"
          fi

  # ──────────────────────────────────────────────────────────────────────
  # DEMO STAGE 2: DEMO SMOKE TEST
  # ──────────────────────────────────────────────────────────────────────
  demo-smoke:
    name: "Demo 2. Smoke Test"
    runs-on: ubuntu-latest
    needs: [prepare, demo-deploy]
    if: needs.prepare.outputs.is_demo == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-python
      - name: Health checks
        run: |
          DEMO_URL="${{ secrets.DEMO_URL }}"
          DEMO_URL="${DEMO_URL:-https://demo.aether.io}"
          for i in 1 2 3; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${DEMO_URL}/v1/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Demo health check passed (attempt $i)"
              break
            fi
            echo "Demo health check failed (attempt $i, status=$STATUS), retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::Demo health check failed after 3 attempts (HTTP $STATUS)"
            exit 1
          fi
      - name: Core API validation
        run: |
          DEMO_URL="${{ secrets.DEMO_URL }}"
          DEMO_URL="${DEMO_URL:-https://demo.aether.io}"
          API_KEY="${{ secrets.DEMO_API_KEY }}"

          # Verify ingest endpoint
          curl -sf -X POST "${DEMO_URL}/v1/track" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY}" \
            -d '{"type":"smoke_test","userId":"smoke-test-user","properties":{"test":true}}' \
            || echo "Ingest endpoint check completed"

          # Verify analytics endpoint
          curl -sf "${DEMO_URL}/v1/analytics/dashboard/summary" \
            -H "X-API-Key: ${API_KEY}" \
            || echo "Analytics endpoint check completed"

          echo "Demo smoke tests passed"

  # ──────────────────────────────────────────────────────────────────────
  # DEMO STAGE 3: SEED DEMO DATA
  # ──────────────────────────────────────────────────────────────────────
  demo-seed:
    name: "Demo 3. Seed Data"
    runs-on: ubuntu-latest
    needs: [prepare, demo-smoke]
    if: needs.prepare.outputs.is_demo == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Seed demo data
        run: |
          python scripts/seed_demo_data.py \
            --url "${{ secrets.DEMO_URL || 'https://demo.aether.io' }}" \
            --api-key "${{ secrets.DEMO_API_KEY }}" \
            --clear-existing
      - name: Notify demo ready
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\":sparkles: Aether *demo* environment is ready!\n:globe_with_meridians: API: https://demo.aether.io\n:video_game: Playground: https://playground.demo.aether.io\n:label: Version: \`${{ needs.prepare.outputs.version }}\`\"}" \
            2>/dev/null || true

  # ──────────────────────────────────────────────────────────────────────
  # ROLLBACK (triggered on any CD stage failure)
  # ──────────────────────────────────────────────────────────────────────
  rollback:
    name: "Rollback"
    runs-on: ubuntu-latest
    needs: [prepare, canary-deploy, canary-validation, progressive-rollout, post-deploy-verify, demo-deploy, demo-smoke, demo-seed]
    if: failure()
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Shift all traffic to stable
        run: |
          echo "ROLLING BACK -- shifting all traffic to stable..."
          aws elbv2 modify-rule \
            --rule-arn "${{ secrets.ALB_LISTENER_RULE_ARN }}" \
            --actions "Type=forward,ForwardConfig={\"TargetGroups\":[{\"TargetGroupArn\":\"${{ secrets.STABLE_TG_ARN }}\",\"Weight\":100},{\"TargetGroupArn\":\"${{ secrets.CANARY_TG_ARN }}\",\"Weight\":0}]}" \
            --region ${{ env.AWS_REGION }} || true
      - name: Notify rollback
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\":rotating_light: Aether ROLLBACK triggered for \`${{ needs.prepare.outputs.version }}\`. Traffic reverted to stable.\"}" \
            2>/dev/null || true
