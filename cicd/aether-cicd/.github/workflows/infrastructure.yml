name: "Aether Infrastructure"

on:
  push:
    branches: [main]
    paths: ["infrastructure/**", "terraform/**"]
  pull_request:
    branches: [main]
    paths: ["infrastructure/**", "terraform/**"]
  schedule:
    - cron: "0 6 * * *"   # Daily drift detection at 6 AM UTC

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: us-east-1

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # TERRAFORM PLAN (runs on PRs) + cost estimation
  # ──────────────────────────────────────────────────────────────────────
  plan:
    name: "Terraform Plan — ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        environment: [dev, staging, production, demo]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        run: |
          terraform -chdir=terraform/environments/${{ matrix.environment }} init \
            -input=false \
            -backend-config="key=${{ matrix.environment }}/terraform.tfstate"
      - name: Terraform Validate
        run: terraform -chdir=terraform/environments/${{ matrix.environment }} validate
      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=terraform/environments/${{ matrix.environment }} plan \
            -var-file="${{ matrix.environment }}.tfvars" \
            -out=${{ matrix.environment }}.tfplan \
            -no-color 2>&1 | tee plan_output.txt
      - name: Cost estimation (Infracost)
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
        continue-on-error: true
      - name: Generate cost diff
        run: |
          infracost breakdown \
            --path=terraform/environments/${{ matrix.environment }} \
            --format=json --out-file=/tmp/infracost.json 2>/dev/null || true
        continue-on-error: true
      - name: Comment PR with plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n... (truncated)'
              : plan;

            let costInfo = '';
            try {
              const cost = JSON.parse(fs.readFileSync('/tmp/infracost.json', 'utf8'));
              costInfo = `\n\n**Estimated monthly cost:** $${cost.totalMonthlyCost || 'N/A'}`;
            } catch (e) {}

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan — \`${{ matrix.environment }}\`${costInfo}\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ──────────────────────────────────────────────────────────────────────
  # TERRAFORM APPLY (runs on merge to main)
  # Sequential: dev -> staging -> production with environment protection
  # ──────────────────────────────────────────────────────────────────────
  apply-dev:
    name: "Apply — dev"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init + Apply
        run: |
          cd terraform/environments/dev
          terraform init -input=false -backend-config="key=dev/terraform.tfstate"
          terraform apply -var-file="dev.tfvars" -auto-approve

  apply-demo:
    name: "Apply — demo"
    runs-on: ubuntu-latest
    needs: [apply-dev]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: demo
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init + Apply
        run: |
          cd terraform/environments/demo
          terraform init -input=false -backend-config="key=demo/terraform.tfstate"
          terraform apply -var-file="demo.tfvars" -auto-approve

  apply-staging:
    name: "Apply — staging"
    runs-on: ubuntu-latest
    needs: [apply-dev, apply-demo]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init + Apply
        run: |
          cd terraform/environments/staging
          terraform init -input=false -backend-config="key=staging/terraform.tfstate"
          terraform apply -var-file="staging.tfvars" -auto-approve

  apply-production:
    name: "Apply — production"
    runs-on: ubuntu-latest
    needs: [apply-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init + Apply
        run: |
          cd terraform/environments/production
          terraform init -input=false -backend-config="key=production/terraform.tfstate"
          terraform apply -var-file="production.tfvars" -auto-approve

  # ──────────────────────────────────────────────────────────────────────
  # DRIFT DETECTION (daily cron)
  # ──────────────────────────────────────────────────────────────────────
  drift-detection:
    name: "Drift Detection — ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    if: github.event.schedule != ''
    strategy:
      matrix:
        environment: [staging, production, demo]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        run: |
          terraform -chdir=terraform/environments/${{ matrix.environment }} init \
            -input=false \
            -backend-config="key=${{ matrix.environment }}/terraform.tfstate"
      - name: Check for drift
        id: drift
        run: |
          set +e
          terraform -chdir=terraform/environments/${{ matrix.environment }} plan \
            -var-file="${{ matrix.environment }}.tfvars" \
            -detailed-exitcode -no-color 2>&1 | tee drift_output.txt
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 2 ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi
      - name: Alert on drift
        if: steps.drift.outputs.drift_detected == 'true'
        run: |
          DRIFT_SUMMARY=$(head -50 drift_output.txt)
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\":warning: Terraform drift detected in *${{ matrix.environment }}*! Review required.\n\`\`\`${DRIFT_SUMMARY}\`\`\`\"}" \
            2>/dev/null || true
