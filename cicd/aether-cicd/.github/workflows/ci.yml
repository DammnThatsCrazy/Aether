name: "Aether CI Pipeline"

on:
  push:
    branches: [develop, "feature/**", "release/**"]
  pull_request:
    branches: [develop, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: aether

permissions:
  contents: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # CHANGE DETECTION — determine which services are affected
  # ──────────────────────────────────────────────────────────────────────
  detect-changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.changes.outputs.affected }}
      run_all: ${{ steps.changes.outputs.run_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref || 'develop' }}...HEAD 2>/dev/null || echo "")

          # Check if global paths changed (always run everything)
          RUN_ALL=false
          for path in .github/ config/ infrastructure/ packages/common/; do
            if echo "$CHANGED" | grep -q "^${path}"; then
              RUN_ALL=true
              break
            fi
          done

          if [ "$RUN_ALL" = "true" ] || [ -z "$CHANGED" ]; then
            echo "run_all=true" >> $GITHUB_OUTPUT
            echo "affected=all" >> $GITHUB_OUTPUT
          else
            # Build comma-separated list of affected services
            AFFECTED=""
            for svc in ingestion identity analytics ml-serving agent campaign consent notification admin; do
              if echo "$CHANGED" | grep -q "^services/${svc}/"; then
                AFFECTED="${AFFECTED},${svc}"
              fi
            done
            AFFECTED="${AFFECTED#,}"
            echo "run_all=false" >> $GITHUB_OUTPUT
            echo "affected=${AFFECTED:-all}" >> $GITHUB_OUTPUT
          fi
          echo "Affected services: $(cat $GITHUB_OUTPUT | grep affected)"

  # ──────────────────────────────────────────────────────────────────────
  # STAGE 1 + 5: LINT + SECURITY SCAN (parallel — no dependency)
  # ──────────────────────────────────────────────────────────────────────
  lint:
    name: "1. Lint"
    runs-on: ubuntu-latest
    needs: [detect-changes]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-python
        with:
          install-python: "true"
          python-packages: "black ruff"
      - name: ESLint (TypeScript)
        run: npx turbo run lint --filter='./packages/*' --filter='./services/*'
      - name: Black + Ruff (Python)
        run: |
          black --check services/ml-serving services/agent
          ruff check services/ml-serving services/agent

  security-scan:
    name: "5. Security Scan"
    runs-on: ubuntu-latest
    needs: [detect-changes]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript,python
      - name: Snyk vulnerability scan
        uses: snyk/actions/node@master
        continue-on-error: false
        with:
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: GitLeaks secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # ──────────────────────────────────────────────────────────────────────
  # STAGE 2: TYPE CHECK (depends on lint)
  # ──────────────────────────────────────────────────────────────────────
  type-check:
    name: "2. Type Check"
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-python
        with:
          install-python: "true"
          python-packages: "mypy"
      - name: TypeScript type check
        run: npx turbo run type-check
      - name: mypy (Python)
        run: mypy --strict services/ml-serving services/agent

  # ──────────────────────────────────────────────────────────────────────
  # STAGE 3: UNIT TEST (depends on type-check)
  # ──────────────────────────────────────────────────────────────────────
  unit-test:
    name: "3. Unit Test"
    runs-on: ubuntu-latest
    needs: [type-check]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-python
        with:
          install-python: "true"
          python-packages: "pytest pytest-cov"
      - name: Jest (Node services + packages)
        run: |
          npx turbo run test -- --ci --coverage --coverageReporters=json-summary
      - name: pytest (Python services)
        run: |
          pytest services/ml-serving services/agent \
            --cov --cov-report=json --cov-fail-under=90 -q
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            **/coverage/coverage-summary.json
            **/coverage.json

  # ──────────────────────────────────────────────────────────────────────
  # STAGE 4: INTEGRATION TEST (depends on unit-test)
  # ──────────────────────────────────────────────────────────────────────
  integration-test:
    name: "4. Integration Test"
    runs-on: ubuntu-latest
    needs: [unit-test]
    timeout-minutes: 20
    services:
      localstack:
        image: localstack/localstack:latest
        ports: ["4566:4566"]
        env:
          SERVICES: s3,sqs,sns,dynamodb,secretsmanager
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      postgres:
        image: timescale/timescaledb:latest-pg15
        ports: ["5432:5432"]
        env:
          POSTGRES_DB: aether_test
          POSTGRES_USER: aether
          POSTGRES_PASSWORD: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-python
        with:
          install-python: "true"
          python-packages: "pytest httpx"
      - name: Contract tests (Node)
        run: npx jest --config jest.integration.config.js --ci
        env:
          LOCALSTACK_ENDPOINT: http://localhost:4566
          REDIS_HOST: localhost
          TSDB_HOST: localhost
      - name: Contract tests (Python)
        run: pytest tests/integration -q

  # ──────────────────────────────────────────────────────────────────────
  # STAGE 6: BUILD (depends on integration-test + security-scan)
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: "6. Build — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [integration-test, security-scan]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - ingestion
          - identity
          - analytics
          - ml-serving
          - agent
          - campaign
          - consent
          - notification
          - admin
    steps:
      - uses: actions/checkout@v4

      # Skip if service not affected by changes
      - name: Check if affected
        id: check
        run: |
          AFFECTED="${{ needs.detect-changes.outputs.affected }}"
          if [ "$AFFECTED" = "all" ] || echo "$AFFECTED" | grep -q "${{ matrix.service }}"; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping ${{ matrix.service }} (not affected)"
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.check.outputs.skip == 'false'
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2
        if: steps.check.outputs.skip == 'false'

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/aether-${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/aether-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign container image
        if: steps.check.outputs.skip == 'false'
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign --yes ${{ env.ECR_REGISTRY }}/aether-${{ matrix.service }}:${{ github.sha }}
        if: steps.check.outputs.skip == 'false'

      - name: Check image size
        if: steps.check.outputs.skip == 'false'
        run: |
          SIZE=$(docker image inspect ${{ env.ECR_REGISTRY }}/aether-${{ matrix.service }}:${{ github.sha }} --format='{{.Size}}' 2>/dev/null || echo 0)
          SIZE_MB=$((SIZE / 1048576))
          echo "Image size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 500 ]; then
            echo "::error::Image exceeds 500MB budget"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────────────
  # STAGE 7: E2E TEST (depends on build, only on develop/release)
  # ──────────────────────────────────────────────────────────────────────
  e2e-test:
    name: "7. E2E Test"
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 30
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/'))
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-python
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Playwright E2E
        run: npx playwright test --config=e2e/playwright.config.ts
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: e2e/test-results/

  # ──────────────────────────────────────────────────────────────────────
  # STAGE 8: PERFORMANCE TEST (depends on e2e, only on release)
  # ──────────────────────────────────────────────────────────────────────
  performance-test:
    name: "8. Performance Test"
    runs-on: ubuntu-latest
    needs: [e2e-test]
    timeout-minutes: 30
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: Load test
        run: k6 run --out json=perf/results.json perf/load.k6.js
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
      - name: Validate P99 latency
        run: |
          P99=$(jq '.metrics.http_req_duration.values["p(99)"]' perf/results.json)
          echo "P99 latency: ${P99}ms"
          if (( $(echo "$P99 > 200" | bc -l) )); then
            echo "::error::P99 latency ${P99}ms exceeds 200ms threshold"
            exit 1
          fi
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: perf/

  # ──────────────────────────────────────────────────────────────────────
  # NOTIFY — send CI result to Slack
  # ──────────────────────────────────────────────────────────────────────
  notify:
    name: "Notify"
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test, integration-test, security-scan, build]
    if: always()
    steps:
      - name: Notify CI result
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            STATUS="FAILED"
            EMOJI=":x:"
          else
            STATUS="PASSED"
            EMOJI=":white_check_mark:"
          fi
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"${EMOJI} Aether CI ${STATUS}: \`${{ github.ref_name }}\` (${{ github.sha }})\"}" \
            2>/dev/null || true
