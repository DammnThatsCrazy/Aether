name: "Aether SDK Release"

on:
  push:
    tags:
      - "sdk-web-v*"
      - "sdk-ios-v*"
      - "sdk-android-v*"
      - "sdk-rn-v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "SDK platform to release"
        required: true
        type: choice
        options: [web, ios, android, react_native, all]
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major]
      pre_release:
        description: "Pre-release tag (empty for stable)"
        required: false
        type: choice
        options: ["", alpha, beta, rc]
      dry_run:
        description: "Dry run (skip publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # WEB SDK -> npm + CDN  (runs in parallel with other SDKs)
  # ──────────────────────────────────────────────────────────────────────
  web-sdk:
    name: "Web SDK Release"
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/sdk-web-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'web' || inputs.platform == 'all'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - run: npm ci
      - name: Build SDK bundles
        working-directory: packages/sdk-web
        run: |
          npx esbuild src/index.ts --bundle --format=esm --outfile=dist/aether-sdk.esm.js
          npx esbuild src/index.ts --bundle --format=esm --minify --outfile=dist/aether-sdk.esm.min.js
          npx esbuild src/index.ts --bundle --format=iife --global-name=Aether --outfile=dist/aether-sdk.umd.js
          npx tsc --emitDeclarationOnly --outDir dist/types
      - name: Run SDK tests
        working-directory: packages/sdk-web
        run: npx jest --ci
      - name: Generate changelog
        run: npx conventional-changelog -p angular -i CHANGELOG.md -s --commit-path packages/sdk-web
      - name: Publish to npm
        if: inputs.dry_run != 'true'
        working-directory: packages/sdk-web
        run: |
          TAG_FLAG=""
          if [ -n "${{ inputs.pre_release }}" ]; then
            TAG_FLAG="--tag ${{ inputs.pre_release }}"
          fi
          npm publish --access public $TAG_FLAG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Upload to CDN
        if: inputs.dry_run != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CDN_ROLE_ARN }}
          aws-region: us-east-1
      - name: Sync CDN
        if: inputs.dry_run != 'true'
        run: |
          VERSION=$(node -p "require('./packages/sdk-web/package.json').version")
          aws s3 sync packages/sdk-web/dist/ "s3://cdn.aether.network/sdk/${VERSION}/" --acl public-read
          aws s3 sync packages/sdk-web/dist/ "s3://cdn.aether.network/sdk/latest/" --acl public-read
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CDN_DISTRIBUTION_ID }} --paths "/sdk/*"
      - name: Create GitHub Release
        if: inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ inputs.pre_release != '' }}
          files: |
            packages/sdk-web/dist/aether-sdk.esm.min.js
            packages/sdk-web/dist/aether-sdk.umd.js

  # ──────────────────────────────────────────────────────────────────────
  # iOS SDK -> CocoaPods + SPM
  # ──────────────────────────────────────────────────────────────────────
  ios-sdk:
    name: "iOS SDK Release"
    runs-on: macos-14
    if: >
      startsWith(github.ref, 'refs/tags/sdk-ios-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all'))
    steps:
      - uses: actions/checkout@v4
      - name: Build
        working-directory: packages/sdk-ios
        run: |
          xcodebuild -scheme AetherSDK \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build
      - name: Test
        working-directory: packages/sdk-ios
        run: |
          xcodebuild test -scheme AetherSDK \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15'
      - name: Pod lint
        working-directory: packages/sdk-ios
        run: pod lib lint AetherSDK.podspec --allow-warnings
      - name: Pod push
        if: inputs.dry_run != 'true'
        working-directory: packages/sdk-ios
        run: pod trunk push AetherSDK.podspec --allow-warnings
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
      - name: Create GitHub Release
        if: inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ inputs.pre_release != '' }}

  # ──────────────────────────────────────────────────────────────────────
  # ANDROID SDK -> Maven Central
  # ──────────────────────────────────────────────────────────────────────
  android-sdk:
    name: "Android SDK Release"
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/sdk-android-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build
        working-directory: packages/sdk-android
        run: ./gradlew assembleRelease
      - name: Unit tests
        working-directory: packages/sdk-android
        run: ./gradlew test
      - name: Publish to Maven Central
        if: inputs.dry_run != 'true'
        working-directory: packages/sdk-android
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      - name: Create GitHub Release
        if: inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ inputs.pre_release != '' }}

  # ──────────────────────────────────────────────────────────────────────
  # REACT NATIVE SDK -> npm (coordinated)
  # ──────────────────────────────────────────────────────────────────────
  react-native-sdk:
    name: "React Native SDK Release"
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/sdk-rn-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'react_native' || inputs.platform == 'all'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Sync native dependencies
        working-directory: packages/sdk-react-native
        run: node scripts/sync-native-deps.js
      - name: Build
        working-directory: packages/sdk-react-native
        run: npx bob build
      - name: Test
        working-directory: packages/sdk-react-native
        run: npx jest --ci
      - name: Publish to npm
        if: inputs.dry_run != 'true'
        working-directory: packages/sdk-react-native
        run: |
          TAG_FLAG=""
          if [ -n "${{ inputs.pre_release }}" ]; then
            TAG_FLAG="--tag ${{ inputs.pre_release }}"
          fi
          npm publish --access public $TAG_FLAG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        if: inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ inputs.pre_release != '' }}

  # ──────────────────────────────────────────────────────────────────────
  # NOTIFY
  # ──────────────────────────────────────────────────────────────────────
  notify:
    name: "Notify SDK Release"
    runs-on: ubuntu-latest
    needs: [web-sdk, ios-sdk, android-sdk, react-native-sdk]
    if: always() && !cancelled()
    steps:
      - name: Notify result
        run: |
          DRY_RUN=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY_RUN=" [DRY RUN]"; fi
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\":package: Aether SDK release completed${DRY_RUN}: ${{ github.ref_name }}\"}" \
            2>/dev/null || true
